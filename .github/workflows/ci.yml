name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  checks: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable

      - run: yarn install --immutable

      - name: ESLint
        run: yarn lint

      - name: Prettier
        run: yarn format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable

      - run: yarn install --immutable

      - name: Run tests
        id: tests
        run: yarn test --coverage --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name: Test report annotations
        uses: dorny/test-reporter@v1
        if: always() && hashFiles('reports/junit.xml') != ''
        with:
          name: Jest Results
          path: reports/junit.xml
          reporter: jest-junit
          fail-on-error: false

      - name: Upload to Codecov
        if: steps.tests.outcome == 'success'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Coverage summary
        if: steps.tests.outcome == 'success'
        run: |
          node -e "
            const c = require('./coverage/coverage-summary.json').total;
            const fmt = (v) => v.pct.toFixed(1) + '%';
            const bar = (v) => {
              const filled = Math.round(v.pct / 5);
              return '\u2588'.repeat(filled) + '\u2591'.repeat(20 - filled);
            };
            const emoji = (v) => v.pct >= 80 ? '\u2705' : v.pct >= 50 ? '\u26a0\ufe0f' : '\u274c';

            let md = '## Test Coverage\n\n';
            md += '| Metric | Coverage | Bar |\n';
            md += '|--------|----------|-----|\n';
            md += '| ' + emoji(c.lines) + ' Lines | **' + fmt(c.lines) + '** | \`' + bar(c.lines) + '\` |\n';
            md += '| ' + emoji(c.branches) + ' Branches | **' + fmt(c.branches) + '** | \`' + bar(c.branches) + '\` |\n';
            md += '| ' + emoji(c.functions) + ' Functions | **' + fmt(c.functions) + '** | \`' + bar(c.functions) + '\` |\n';
            md += '| ' + emoji(c.statements) + ' Statements | **' + fmt(c.statements) + '** | \`' + bar(c.statements) + '\` |\n';
            md += '\n> Coverage target: 70% lines\n';

            require('fs').writeFileSync('coverage-summary.md', md);
          "
          cat coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Build & Publish
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable

      - run: yarn install --immutable

      # A stable release is ONLY when `yarn release` (changeset version) was run.
      # That commit modifies CHANGELOG.md and consumes .changeset/*.md files.
      # Everything else is a preview/canary build.
      - name: Detect release type
        id: detect
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check if CHANGELOG.md was modified in this commit (= changeset version bump)
          if git diff --name-only HEAD~1 HEAD | grep -q '^CHANGELOG.md$'; then
            echo "type=stable" >> "$GITHUB_OUTPUT"
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "docker_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "type=preview" >> "$GITHUB_OUTPUT"
            echo "tag=${VERSION}-preview.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "docker_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:preview,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-preview.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.detect.outputs.docker_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=tripsheet
            org.opencontainers.image.description=Self-hosted itinerary editor with Claude-powered research suggestions
            org.opencontainers.image.version=${{ steps.detect.outputs.tag }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # Extract the new version's section from CHANGELOG.md so the GitHub
      # Release body shows the same human-written summary as the changelog
      # (the bullets each changeset produced), not just auto-generated notes.
      - name: Extract changelog section
        if: steps.detect.outputs.type == 'stable'
        id: changelog
        run: |
          VERSION="${{ steps.detect.outputs.version }}"
          # Grab everything between "## <version>" and the next "## " heading.
          awk -v ver="## ${VERSION}" '
            $0 == ver { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::No CHANGELOG.md section found for ${VERSION}; falling back to auto-generated notes only."
          else
            echo "Extracted changelog section for ${VERSION}:"
            cat RELEASE_NOTES.md
          fi

      # Only create a GitHub Release for stable versions
      - name: Create GitHub Release
        if: steps.detect.outputs.type == 'stable'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.detect.outputs.version }}
          name: v${{ steps.detect.outputs.version }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true

      - name: Summary
        run: |
          echo "### Release Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Type | **${{ steps.detect.outputs.type }}** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${{ steps.detect.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.detect.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
